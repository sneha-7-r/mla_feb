<!DOCTYPE html>
<html xmlns:th ="https://www.thymeleaf.org"
      xmlns:sec= "https:/www.thymeleaf.org/thymeleaf-extras=springsecurity3">
<head>
<meta charset="UTF-8">
<title>User Authorities</title>
</head>
<body>
<!-- <h1 th:inline="text">Spring Security <span sec:authentication="name"></span></h1> -->
<!-- <a href="/read" alt="read details">Read</a><br><br> -->
<!-- <a href="/update" alt="update details">Update</a><br><br> -->
<!-- <a href="/delete" alt="delete details">Delete</a><br><br> -->
<!-- <a href="/onboard" alt="delete details">HR</a><br><br> -->

<div sec:authorize="isAuthenticated()">
Welcome <b><span sec:authentication="Username"></span></b>
&nbsp;
<i><span sec:authentication="principal.authorities">Roles</span></i>
</div>

<form th:action="@{/logout}" method="post">
<input type="submit" value="sign out">
</form>

<h1>AUTHORITY | ACCESS</h1>
<div sec:authorize="hasAnyAuthority('ROLE_USER','ROLE_ADMIN)">
<a href="user/read">READ USER DATA</a><br><br>
</div>


<div sec:authorize="hasAnyAuthority('ROLE_ADMIN)">
<a href="delete">DELETE USER DATA</a><br><br>
<a href="update">UPDATE USER DATA</a>
</div>

<div sec:authorize="hasAnyAuthority('ROLE_HR','ROLE_EMPLOYEE')">
<a href="user/hr/onboard">HR | EMPLOYEE</a><br><br>
</div>


</body>
</html>
